<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NU40 — Smart Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-light: 255, 255, 255;
    --bg-dark: 10, 10, 12;
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
    --glass-shadow: rgba(0,0,0,0.3);
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.45);
    --text-tertiary: rgba(255,255,255,0.2);
    --accent: rgba(255,255,255,0.9);
    --glow-color: 255, 240, 200;
    --transition-speed: 1.2s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: rgb(10, 10, 12);
    transition: background var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── 조명 glow 효과 (상단) ── */
  .light-source {
    position: fixed;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at center top,
      rgba(var(--glow-color), 1) 0%,
      rgba(var(--glow-color), 0.7) 30%,
      rgba(var(--glow-color), 0.3) 55%,
      rgba(var(--glow-color), 0) 75%
    );
    filter: blur(20px);
    opacity: 0;
    transition: opacity var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 0;
  }

  /* ── 배경 노이즈 텍스처 ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── 메인 레이아웃 ── */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── 헤더 ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    margin-bottom: 8px;
  }
  .header-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .connect-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 7px 16px;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(12px);
  }
  .connect-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.25);
  }
  .connect-btn.connected {
    border-color: rgba(100,255,150,0.4);
    color: rgba(100,255,150,0.9);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    transition: background 0.3s ease;
  }
  .connect-btn.connected .status-dot {
    background: rgba(100,255,150,0.9);
    box-shadow: 0 0 6px rgba(100,255,150,0.6);
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── 글래스 카드 ── */
  .card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 24px 28px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: all 0.3s ease;
  }

  /* ── 조도 카드 ── */
  .light-card {}
  .card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 16px;
  }
  .light-value-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }
  .light-value {
    font-size: 64px;
    font-weight: 300;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -3px;
    font-variant-numeric: tabular-nums;
    transition: color 0.8s ease;
  }
  .light-unit {
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }
  .light-status {
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    transition: color 0.8s ease;
  }

  /* ── 조도 바 ── */
  .light-bar-wrap {
    margin-top: 20px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .light-bar-fill {
    height: 100%;
    background: rgba(255,255,255,0.6);
    border-radius: 2px;
    width: 0%;
    transition: width var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── LED 제어 카드 ── */
  .led-card {}
  .led-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  /* ── 토글 스위치 ── */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toggle-label {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }
  .toggle {
    position: relative;
    width: 40px;
    height: 24px;
    cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    transition: all 0.3s ease;
  }
  .toggle input:checked + .toggle-track {
    background: rgba(100,255,150,0.25);
    border-color: rgba(100,255,150,0.4);
  }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle input:checked ~ .toggle-thumb {
    left: 19px;
    background: rgba(100,255,150,0.9);
  }

  /* ── 밝기 슬라이더 ── */
  .brightness-wrap {
    opacity: 0.3;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .brightness-wrap.active {
    opacity: 1;
    pointer-events: auto;
  }
  .brightness-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .brightness-text {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .brightness-val {
    font-size: 13px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }

  /* 슬라이더 커스텀 */
  .slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .slider::-webkit-slider-thumb:hover {
    transform: scale(1.15);
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  }
  .slider::-webkit-slider-runnable-track {
    background: linear-gradient(
      to right,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.5) var(--progress, 0%),
      rgba(255,255,255,0.1) var(--progress, 0%),
      rgba(255,255,255,0.1) 100%
    );
    height: 3px;
    border-radius: 2px;
  }

  /* ── LED 밝기 미리보기 (카드 내) ── */
  .led-preview {
    margin-top: 20px;
    height: 1px;
    background: linear-gradient(
      to right,
      transparent,
      rgba(var(--glow-color), 0.6),
      transparent
    );
    opacity: 0;
    transition: opacity var(--transition-speed) ease;
    border-radius: 1px;
  }

  /* ── 연결 안내 ── */
  .disconnected-hint {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 8px 0;
    transition: opacity 0.3s ease;
  }

  /* ── 페이드인 애니메이션 ── */
  .card, .header {
    animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
  }
  .header { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }
  .card:nth-child(4) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- 조명 glow -->
<div class="light-source" id="lightSource"></div>

<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <span class="header-title">Smart Home</span>
    <button class="connect-btn" id="connectBtn" onclick="toggleConnect()">
      <span class="status-dot"></span>
      <span id="connectLabel">Connect</span>
    </button>
  </div>

  <!-- 조도 카드 -->
  <div class="card light-card">
    <div class="card-label">Ambient Light</div>
    <div class="light-value-row">
      <div class="light-value" id="lightValue">—</div>
      <div class="light-unit">lux</div>
    </div>
    <div class="light-status" id="lightStatus">연결 대기 중</div>
    <div class="light-bar-wrap">
      <div class="light-bar-fill" id="lightBar"></div>
    </div>
  </div>

  <!-- LED 제어 카드 -->
  <div class="card led-card">
    <div class="led-header">
      <div class="card-label" style="margin-bottom:0">Lighting</div>
      <div class="toggle-wrap">
        <span class="toggle-label">Auto</span>
        <label class="toggle">
          <input type="checkbox" id="autoToggle" checked onchange="onAutoChange()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div class="brightness-wrap" id="brightnessWrap">
      <div class="brightness-label-row">
        <span class="brightness-text">Brightness</span>
        <span class="brightness-val" id="brightnessVal">0</span>
      </div>
      <input type="range" class="slider" id="brightnessSlider"
             min="0" max="255" value="0"
             oninput="onSliderChange(this.value)">
    </div>

    <div class="led-preview" id="ledPreview"></div>
  </div>

  <!-- 연결 안내 -->
  <div class="disconnected-hint" id="hint">
    위 Connect를 눌러 NU40 DK에 연결하세요
  </div>

</div>

<script>
// ── UUID ──────────────────────────────────────────
const SERVICE_UUID     = '12345678-1234-1234-1234-123456789000';
const SENSOR_UUID      = '12345678-1234-1234-1234-123456789001';
const LED_UUID         = '12345678-1234-1234-1234-123456789002';
const AUTO_UUID        = '12345678-1234-1234-1234-123456789003';

// ── 상태 ──────────────────────────────────────────
let bleDevice = null;
let ledChar   = null;
let autoChar  = null;
let isConnected = false;
let autoMode  = true;
let currentBrightness = 0;
let currentLightVal = 0;

// ── BLE 연결/해제 ─────────────────────────────────
async function toggleConnect() {
  if (isConnected) {
    if (bleDevice) bleDevice.gatt.disconnect();
    return;
  }
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      //filters: [{ name: 'NU40-LIGHT' }],
      optionalServices: [SERVICE_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    // SENSOR — Notify 구독
    const sensorChar = await service.getCharacteristic(SENSOR_UUID);
    await sensorChar.startNotifications();
    sensorChar.addEventListener('characteristicvaluechanged', onSensorData);
    console.log('Notify 구독 완료');  // ← 추가

    // LED, AUTO — Write용 저장
    ledChar  = await service.getCharacteristic(LED_UUID);
    autoChar = await service.getCharacteristic(AUTO_UUID);

    setConnected(true);
  } catch(e) {
    console.error(e);
  }
}

function onDisconnected() {
  setConnected(false);
  ledChar = null;
  autoChar = null;
}

function setConnected(val) {
  isConnected = val;
  const btn = document.getElementById('connectBtn');
  const label = document.getElementById('connectLabel');
  const hint = document.getElementById('hint');

  if (val) {
    btn.classList.add('connected');
    label.textContent = 'Connected';
    hint.style.opacity = '0';
  } else {
    btn.classList.remove('connected');
    label.textContent = 'Connect';
    hint.style.opacity = '1';
    // 값 초기화
    document.getElementById('lightValue').textContent = '—';
    document.getElementById('lightStatus').textContent = '연결 대기 중';
    updateBackground(0);
    updateGlow(0);
  }
}

// ── 센서 데이터 수신 ──────────────────────────────
let rawBuffer = '';

function onSensorData(event) {
  const decoder = new TextDecoder();
  rawBuffer += decoder.decode(event.target.value);
  
  // } 로 끝나면 완전한 JSON
  if (rawBuffer.includes('}')) {
    try {
      const data = JSON.parse(rawBuffer);
      rawBuffer = '';
      
      currentLightVal = data.light;
      document.getElementById('lightValue').textContent = data.light;
      document.getElementById('lightStatus').textContent = data.status;
      updateBackground(data.light);

      if (autoMode) {
        const brightness = Math.min(255, Math.max(0,
          Math.round((data.light - 80) / (500 - 80) * 255)
        ));
        currentBrightness = brightness;
        updateGlow(brightness);
        updateSlider(brightness);
      }

      const pct = Math.min(100, Math.max(0,
        (data.light - 80) / (500 - 80) * 100
      ));
      document.getElementById('lightBar').style.width = pct + '%';
    } catch(e) {
      rawBuffer = '';
    }
  }
}

// ── 배경색 업데이트 (조도값 → 어두움/밝음) ───────
function updateBackground(lightVal) {
  // 80=밝음(밝은배경), 500=어두움(어두운배경)
  const t = Math.min(1, Math.max(0, (lightVal - 80) / (500 - 80)));
  // 밝을때 rgb(240,240,245) 어두울때 rgb(10,10,12)
  const r = Math.round(240 - t * 230);
  const g = Math.round(240 - t * 230);
  const b = Math.round(245 - t * 233);
  document.body.style.background = `rgb(${r},${g},${b})`;

  // 텍스트 색상도 배경에 맞게 반전
  const isDark = t > 0.5;
  const textPrimary   = isDark ? 'rgba(255,255,255,0.92)' : 'rgba(0,0,0,0.85)';
  const textSecondary = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.45)';
  const textTertiary  = isDark ? 'rgba(255,255,255,0.2)'  : 'rgba(0,0,0,0.2)';
  const glassBg       = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.05)';
  const glassBorder   = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)';

  document.documentElement.style.setProperty('--text-primary',   textPrimary);
  document.documentElement.style.setProperty('--text-secondary', textSecondary);
  document.documentElement.style.setProperty('--text-tertiary',  textTertiary);
  document.documentElement.style.setProperty('--glass-bg',       glassBg);
  document.documentElement.style.setProperty('--glass-border',   glassBorder);
}

// ── glow 업데이트 (LED 밝기) ──────────────────────
function updateGlow(brightness) {
  const opacity = brightness / 255;
  const ls = document.getElementById('lightSource');
  ls.style.opacity = opacity;

  // LED preview 선
  const preview = document.getElementById('ledPreview');
  preview.style.opacity = opacity * 0.8;
}

// ── 슬라이더 UI 업데이트 ──────────────────────────
function updateSlider(val) {
  const slider = document.getElementById('brightnessSlider');
  slider.value = val;
  slider.style.setProperty('--progress', (val / 255 * 100) + '%');
  document.getElementById('brightnessVal').textContent = val;
}

// ── 자동화 토글 ───────────────────────────────────
async function onAutoChange() {
  autoMode = document.getElementById('autoToggle').checked;
  const wrap = document.getElementById('brightnessWrap');

  if (autoMode) {
    wrap.classList.remove('active');
    // 자동 모드 ON → 현재 조도값으로 LED 복구
    updateGlow(currentBrightness);
  } else {
    wrap.classList.add('active');
  }

  // BLE 전송
  if (autoChar) {
    await autoChar.writeValue(new Uint8Array([autoMode ? 1 : 0]));
  }
}

// ── 슬라이더 변경 ─────────────────────────────────
let ledWriteTimer = null;

async function onSliderChange(val) {
  val = parseInt(val);
  updateSlider(val);
  updateGlow(val);

  // 100ms 내에 연속 호출 시 마지막 값만 전송
  if (ledWriteTimer) clearTimeout(ledWriteTimer);
  ledWriteTimer = setTimeout(async () => {
    if (ledChar && !autoMode) {
      try {
        await ledChar.writeValue(new Uint8Array([val]));
      } catch(e) {}
    }
  }, 100);
}

// ── 슬라이더 progress 초기화 ──────────────────────
document.getElementById('brightnessSlider').addEventListener('input', function() {
  this.style.setProperty('--progress', (this.value / 255 * 100) + '%');
});
</script>
</body>
</html>
